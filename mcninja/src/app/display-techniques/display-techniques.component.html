@for (technique of techniques(); track technique.id) {
  <div class="technique-container">
    <h3>{{technique.title}}</h3>
      <p>The {{technique.title}} is a {{technique.belt}} Belt technique</p>
      <p><b>Technique Execution</b></p>
      <div [innerHTML]="technique.execution"></div>
      <p><b>Pro-tip:</b> {{technique.proTip}}</p>
      <div [innerHTML]="technique.video"></div> <!-- need dom sanitizer? -->
      <p><b>Mastered?</b> {{technique.mastered}}</p> <!-- use @if directive? -->
  </div>
}
