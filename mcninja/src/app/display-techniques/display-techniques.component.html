@for (technique of techniquesArray(); track technique.id) {
  <h3>{{technique.title}}</h3>
  <p>The {{technique.title}} is a {{technique.belt}} Belt technique</p>
  <p>Technique Execution</p>
  <span>{{technique.description}}</span>
  <p>Pro-tip: {{technique.proTip}}</p>
  <p>{{Video}}</p>
  <p>Mastered? {{technique.mastered}}</p> <!-- use @if directive? -->
}
