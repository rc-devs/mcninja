@for (tech of techniques(); track tech.id) {
    <p>{{tech.title}}</p>
    <button (click)="displayDescription()">Display Description</button>
    <p>{{tech.description}}</p>
      <button (click)="addToMastered()">Mastered</button>
      <button (click)="removeFromMastered()">Not Mastered</button>
}
