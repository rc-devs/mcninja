<form #form (submit)="addExerciseHandler(nameInput.value, iterationInput.value, durationInput.value)">
  <input #nameInput name='name' type="text" placeholder="Exercise Name">
  <input #iterationInput name='iteration' type="text" placeholder="Number of iterations">
  <input #durationInput name='duration' type="text" placeholder="Duration to complete (seconds)">
</form>
